name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check that embedded files are in sync before other jobs
  # This catches packaging issues early (before they break cargo install)
  check-embedded-files:
    name: Check embedded files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check embedded files are in sync
        run: ./scripts/sync-embedded-files.sh check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check-embedded-files
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check-embedded-files
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Run hooks BDD acceptance tests (deterministic, CI-safe mode)
  # These test the hooks feature implementation against acceptance criteria
  hooks-bdd:
    name: Hooks BDD Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build ralph-e2e
        run: cargo build --release -p ralph-e2e
      - name: Run hooks BDD tests
        run: cargo test -p ralph-e2e hooks_bdd -- --nocapture
      - name: Upload hooks BDD report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hooks-bdd-report
          path: |
            .e2e-tests/hooks-bdd-*.json
            crates/ralph-e2e/features/hooks/TRACEABILITY.md
          retention-days: 30

  # Run mock E2E tests (cost-free, deterministic cassette replay)
  # Note: Tests may fail but job succeeds to avoid blocking CI (report has details)
  e2e-mock:
    name: E2E Tests (Mock)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build ralph and ralph-e2e
        run: cargo build --release -p ralph-cli -p ralph-e2e
      - name: Run mock E2E tests
        run: ./target/release/ralph-e2e --mock --skip-analysis || true
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: .e2e-tests/report.md
          retention-days: 30

  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: check-embedded-files
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm run test:server
      - run: npm run test -w @ralph-web/dashboard

  # Run mutation testing on hooks-critical modules
  # Enforces: operational score >= 55%, no MISS survivors in critical paths
  hooks-mutation:
    name: Hooks Mutation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run mutation tests on hooks-critical modules
        id: mutation
        run: |
          # Run mutation tests on scoped hooks-critical modules
          cargo mutants \
            --baseline skip \
            --file crates/ralph-core/src/hooks/executor.rs \
            --file crates/ralph-core/src/hooks/engine.rs \
            --file crates/ralph-core/src/preflight.rs \
            --file crates/ralph-cli/src/loop_runner.rs \
            -o /tmp/hooks-mutants-output \
            --no-times \
            --colors never \
            --caught \
            --unviable \
            || true
          
          # Parse results for CI gate checks
          cd /tmp/hooks-mutants-output
          CAUGHT=$(wc -l < caught.txt 2>/dev/null || echo 0)
          MISSED=$(wc -l < missed.txt 2>/dev/null || echo 0)
          TIMEOUT=$(wc -l < timeout.txt 2>/dev/null || echo 0)
          
          echo "Caught: $CAUGHT, Missed: $MISSED, Timeout: $TIMEOUT"
          
          # Calculate operational score: caught / (caught + missed)
          if [ "$((CAUGHT + MISSED))" -eq 0 ]; then
            echo "No mutants tested"
            exit 1
          fi
          
          # Calculate score as integer (multiply by 100 to avoid float issues)
          SCORE=$((CAUGHT * 100 / (CAUGHT + MISSED)))
          echo "Operational score: $SCORE%"
          
          # Gate 1: Operational score >= 55%
          if [ "$SCORE" -lt 55 ]; then
            echo "FAIL: Mutation score $SCORE% < 55%"
            echo "score_passed=false" >> $GITHUB_OUTPUT
          else
            echo "PASS: Mutation score $SCORE% >= 55%"
            echo "score_passed=true" >> $GITHUB_OUTPUT
          fi
          
          # Gate 2: No MISS survivors in critical paths (disposition/suspend logic)
          # Critical ranges: loop_runner.rs:3467-3560 (suspend/resume), 3623-3635 (on_error)
          CRITICAL_MISS=$(grep -E "^MISS.*loop_runner\.rs:(346[789]|35[0-5][0-9]|3560|362[3-9]|363[0-5])" missed.txt 2>/dev/null | wc -l || echo 0)
          echo "Critical-path MISS survivors: $CRITICAL_MISS"
          
          if [ "$CRITICAL_MISS" -gt 0 ]; then
            echo "FAIL: $CRITICAL_MISS MISS survivors in critical disposition/suspend paths"
            echo "critical_passed=false" >> $GITHUB_OUTPUT
          else
            echo "PASS: No MISS survivors in critical paths"
            echo "critical_passed=true" >> $GITHUB_OUTPUT
          fi
          
          # Fail job if either gate fails
          if [ "$SCORE" -lt 55 ] || [ "$CRITICAL_MISS" -gt 0 ]; then
            exit 1
          fi
      - name: Upload mutation report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hooks-mutation-report
          path: |
            /tmp/hooks-mutants-output/*.txt
            /tmp/hooks-mutants-output/*.json
          retention-days: 30

  # Verify the crate can be packaged (catches include_str! issues)
  # Only runs on PRs - main pushes are either merges (already verified) or
  # version bumps (Release workflow handles publishing with correct deps)
  package-check:
    name: Package check
    runs-on: ubuntu-latest
    needs: [check-embedded-files, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check ralph-cli packages correctly
        run: |
          # This will fail if include_str! references files outside the crate
          # Use --list to validate without resolving crates.io dependencies
          cargo package -p ralph-cli --allow-dirty --list > /dev/null
          echo "Package check passed - all embedded files are included"
