_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Ralph
  description: Ralph Orchestrator human-in-the-loop Slack surface
  background_color: "#2f3136"
features:
  bot_user:
    display_name: Ralph
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - files:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
